<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OperationBrowser</title>

    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="example.css" />

    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script src="/baremux/index.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/uv/sw.js").catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <div id="tab-bar">
      <div id="tabs-list"></div>
      <div id="new-tab-btn" title="Nouvel onglet (Ctrl+T)">+</div>
    </div>

    <div id="toolbar">
      <button class="tb off" id="btn-back" title="Précédent (Alt+←)">←</button>
      <button class="tb off" id="btn-fwd" title="Suivant (Alt+→)">→</button>
      <button class="tb" id="btn-reload" title="Recharger (F5)">↻</button>
      <button class="tb" id="btn-home" title="Accueil (Bing)">⌂</button>
      <div class="tb-sep"></div>

      <div id="addr-wrap">
        <div id="addr-lock">🔒</div>
        <input id="address" type="text" placeholder="Rechercher ou entrer une URL…" autocomplete="off" spellcheck="false" />
        <div id="addr-btns">
          <button class="ab" id="btn-bm" title="Favori (Ctrl+D)">☆</button>
        </div>
        <div id="suggestions"></div>
      </div>

      <div class="tb-sep"></div>

      <select id="transport" class="tbSel" title="Transport proxy">
        <option value="epoxy">Epoxy (wisp)</option>
        <option value="bare">Bare</option>
      </select>

      <button class="tb" id="btn-download" title="Télécharger (URL courante)">⬇</button>
      <button class="tb" id="btn-panel" title="Panneau latéral">☰</button>
    </div>

    <div id="bm-bar"></div>

    <div id="content">
      <div id="frame-wrap">
        <div id="load-bar"></div>

        <iframe
          id="frame"
          sandbox="allow-forms allow-modals allow-pointer-lock allow-same-origin allow-scripts allow-downloads"
          referrerpolicy="no-referrer"
          allow="encrypted-media; geolocation; microphone; camera; autoplay; fullscreen"
        ></iframe>

        <div id="newtab">
          <div class="nt-top">
            <div class="nt-brand">Aether<span>Net</span></div>
            <div class="nt-time" id="nt-time"></div>
          </div>
          <div class="nt-search-wrap">
            <div class="nt-sb">
              <span class="nt-sb-icon">🔍</span>
              <input id="nt-inp" placeholder="Rechercher sur le web…" spellcheck="false" />
              <button class="nt-sb-go" id="nt-go" type="button">→</button>
            </div>
          </div>
          <div class="nt-grid" id="nt-grid"></div>
          <div class="nt-recent">
            <div class="nt-sec-title">Visites récentes</div>
            <div class="nt-card" id="nt-hist"></div>
          </div>
        </div>
      </div>

      <div id="panel">
        <div class="panel-tabs">
          <div class="ptab on" data-p="history">Historique</div>
          <div class="ptab" data-p="bookmarks">Favoris</div>
          <div class="ptab" data-p="downloads">Téléch.</div>
          <div class="ptab" data-p="settings">Réglages</div>
          <div class="pcl" id="panel-close">×</div>
        </div>
        <div id="panel-body"></div>
      </div>
    </div>

    <div id="status-bar">
      <div id="st-left">
        <div class="st-dot g" id="st-dot"></div>
        <span id="st-text">Prêt</span>
        <span class="st-tag st-tag-g" id="st-proxy" style="display: none">Proxy</span>
      </div>
      <div id="st-right">
        <span id="st-url" style="max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap"></span>
      </div>
    </div>

    <script src="example.js"></script>
  </body>
</html>
