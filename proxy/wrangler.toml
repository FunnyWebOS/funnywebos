name = "aetheros-ai-proxy"
main = "worker.js"
compatibility_date = "2026-03-11"

# Configure this in Cloudflare (or here) to restrict which sites can call your proxy.
# Example:
#   ALLOWED_ORIGINS = "https://funnywebos.github.io"
[vars]
# IMPORTANT: Origin headers never include a trailing slash.
# Use comma-separated values if you need multiple origins.
ALLOWED_ORIGINS = "https://funnywebos.github.io"

# Optional: Supabase config endpoint values (/aether/v1/supabase-config).
# Recommendation: set them as Worker vars/secrets in Cloudflare (do not commit real keys).
# SUPABASE_URL = "https://<project-ref>.supabase.co"
# SUPABASE_ANON_KEY = "<anon-key>"
# SUPABASE_TABLE = "aether_users"
# SUPABASE_USERNAME_COLUMN = "username"
# SUPABASE_PASSWORD_COLUMN = "password"
