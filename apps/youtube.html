<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Redux - FunnyWEB OS</title>
    <style>
        :root {
            --red: #FF0000;
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Roboto", sans-serif;
            overflow: hidden;
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: var(--bg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }

        .logo span {
            background: var(--red);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background: #121212;
            border: 1px solid #333;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .search-bar:focus {
            border-color: #3ea6ff;
        }

        .viewport {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .video-card {
            cursor: pointer;
            transition: 0.2s;
        }

        .video-card:hover {
            opacity: 0.8;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #222;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 8px;
        }

        .video-info h3 {
            margin: 0;
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-info p {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--text-dim);
        }

        #player-overlay {
            position: fixed;
            inset: 56px 0 0 0;
            background: black;
            display: none;
            z-index: 1000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 15px;
            font-size: 13px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .loading-ring {
            display: flex;
            justify-content: center;
            padding: 100px;
        }
    </style>
</head>

<body>

    <div class="app-layout">
        <header>
            <div class="logo" onclick="location.reload()">
                <span>YT</span> Redux
            </div>
            <div class="search-container">
                <input type="text" class="search-bar" id="search" placeholder="Rechercher..."
                    onkeypress="if(event.key==='Enter') doSearch()">
            </div>
        </header>

        <main class="viewport" id="main-view">
            <div id="results" class="video-grid">
                <!-- Content here -->
            </div>
        </main>

        <div id="player-overlay">
            <div style="padding: 10px; background: #000; display: flex; align-items: center;">
                <button class="back-btn" onclick="closePlayer()">⬅ Retour à la recherche</button>
                <div id="playing-title" style="font-size: 14px; opacity: 0.8;">Chargement...</div>
            </div>
            <iframe id="yt-player" allow="autoplay; fullscreen; encrypted-media"></iframe>
        </div>
    </div>

    <script>
        // List of reliable Invidious mirrors for API
        const MIRRORS = [
            'https://inv.nadeko.net',
            'https://invidious.nerdvpn.de',
            'https://yt.artemislena.eu',
            'https://invidious.flokinet.to',
            'https://iv.melmac.space'
        ];

        let currentMirrorIndex = 0;

        async function doSearch() {
            const query = document.getElementById('search').value;
            if (!query) return;

            const resultsDir = document.getElementById('results');
            resultsDir.innerHTML = '<div class="loading-ring">Recherche en cours sur YouTube...</div>';

            try {
                const response = await fetchWithRetry(`${MIRRORS[currentMirrorIndex]}/api/v1/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                renderResults(data);
            } catch (err) {
                resultsDir.innerHTML = `<div style="text-align:center; padding:50px;">
                    ❌ Erreur de connexion.<br>
                    <button class="back-btn" style="margin-top:15px;" onclick="doSearch()">Réessayer</button>
                </div>`;
            }
        }

        async function fetchWithRetry(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Failed');
                return res;
            } catch (e) {
                if (currentMirrorIndex < MIRRORS.length - 1) {
                    currentMirrorIndex++;
                    console.log('Switching to mirror:', MIRRORS[currentMirrorIndex]);
                    return fetchWithRetry(url.replace(MIRRORS[currentMirrorIndex - 1], MIRRORS[currentMirrorIndex]));
                }
                throw e;
            }
        }

        function renderResults(videos) {
            const resultsDir = document.getElementById('results');
            resultsDir.innerHTML = videos.map(v => {
                if (v.type !== 'video') return '';
                // Thumbnail proxy to bypass some blocks
                const thumb = v.videoThumbnails ? v.videoThumbnails[0].url : `https://i.ytimg.com/vi/${v.videoId}/hqdefault.jpg`;
                return `
                    <div class="video-card" onclick="openPlayer('${v.videoId}', '${v.title.replace(/'/g, "\\'")}')">
                        <div class="thumbnail">📺</div>
                        <div class="video-info">
                            <h3>${v.title}</h3>
                            <p>${v.author} • ${v.viewCountText} vues</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openPlayer(id, title) {
            document.getElementById('playing-title').innerText = title;
            document.getElementById('yt-player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('player-overlay').style.display = 'block';
        }

        function closePlayer() {
            document.getElementById('yt-player').src = '';
            document.getElementById('player-overlay').style.display = 'none';
        }

        // Home page suggestions
        window.onload = () => {
            document.getElementById('search').value = 'Musique 2026';
            doSearch();
        };
    </script>
</body>

</html>
