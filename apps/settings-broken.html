<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - AetherOS</title>
    <link rel="stylesheet" href="settings/settings.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="settings-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-category">
                    <div class="nav-item active" data-category="apps" onclick="SettingsManager.showCategory('apps')">
                        <i class="fas fa-grid-2"></i>
                        <span>Apps</span>
                    </div>
                    <div class="nav-item" data-category="personalization" onclick="SettingsManager.showCategory('personalization')">
                        <i class="fas fa-palette"></i>
                        <span>Personalization</span>
                    </div>
                    <div class="nav-item" data-category="security" onclick="SettingsManager.showCategory('security')">
                        <i class="fas fa-shield-halved"></i>
                        <span>Security</span>
                    </div>
                    <div class="nav-item" data-category="accounts" onclick="SettingsManager.showCategory('accounts')">
                        <i class="fas fa-user-circle"></i>
                        <span>Accounts</span>
                    </div>
                    <div class="nav-item" data-category="accessibility" onclick="SettingsManager.showCategory('accessibility')">
                        <i class="fas fa-universal-access"></i>
                        <span>Accessibility</span>
                    </div>
                    <div class="nav-item" data-category="system" onclick="SettingsManager.showCategory('system')">
                        <i class="fas fa-desktop"></i>
                        <span>System</span>
                    </div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <img src="https://www.gravatar.com/avatar/000?d=mp&f=y" alt="User" class="user-avatar">
                    <div class="user-details">
                        <div class="user-name" id="current-user-name">User</div>
                        <div class="user-status">Online</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="content-header">
                <h1 id="category-title">Apps</h1>
                <p id="category-description">Manage your applications and default programs</p>
            </header>

            <div class="content-body" id="settings-content">
                <!-- Dynamic content will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="settings/modules/settings-core.js"></script>
    <script src="settings/modules/apps.js"></script>
    <script src="settings/modules/personalization.js"></script>
    <script src="settings/modules/security.js"></script>
    <script src="settings/modules/accounts.js"></script>
    <script src="settings/modules/accessibility.js"></script>
    <script src="settings/modules/system.js"></script>
    <script src="settings/settings.js"></script>
</body>
</html>
