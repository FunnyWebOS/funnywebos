<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebWrap - FunnyWEB OS</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: #0f0f15;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .stremio-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .stremio-header {
      height: 40px;
      background: rgba(20, 20, 30, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      justify-content: space-between;
      user-select: none;
    }

    .stremio-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
      font-size: 14px;
      color: #7b2cbf;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 70vw;
    }

    .stremio-footer {
      height: 30px;
      background: #000;
      color: rgba(255, 255, 255, 0.5);
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .overlay-note {
      position: absolute;
      top: 50px;
      right: 20px;
      background: rgba(123, 44, 191, 0.9);
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 12px;
      max-width: 280px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
      animation: slideIn 0.5s ease-out;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes slideIn {
      from {
        transform: translateX(120%);
      }

      to {
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>
  <div class="stremio-wrapper">
    <div class="stremio-header">
      <div class="stremio-logo" id="appName">Web App</div>
      <div style="opacity:.75; font-size: 11px;" id="appHost"></div>
    </div>
    <iframe id="appFrame" allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>
    <div class="stremio-footer">FunnyWEB OS • WebWrap</div>
  </div>

  <div class="overlay-note" id="welcomeNote" style="display:none;">
    App web chargée via wrapper (pas via le navigateur interne).
  </div>

  <script>
    function safeUrl(raw) {
      var v = String(raw || '').trim();
      if (!v) return '';
      if (!/^https?:\/\//i.test(v)) v = 'https://' + v;
      try {
        var u = new URL(v);
        if (u.protocol !== 'http:' && u.protocol !== 'https:') return '';
        return u.href;
      } catch (e) {
        return '';
      }
    }

    function parseHash() {
      var hash = String(location.hash || '').replace(/^#/, '');
      var params = new URLSearchParams(hash);
      return {
        url: params.get('url') || '',
        name: params.get('name') || '',
        icon: params.get('icon') || ''
      };
    }

    var cfg = parseHash();
    var url = safeUrl(cfg.url);
    var name = String(cfg.name || '').trim();
    var icon = String(cfg.icon || '').trim();

    var nameEl = document.getElementById('appName');
    var hostEl = document.getElementById('appHost');
    var frame = document.getElementById('appFrame');
    var note = document.getElementById('welcomeNote');

    if (!url) {
      nameEl.textContent = 'URL invalide';
      hostEl.textContent = '';
      frame.remove();
      var p = document.createElement('div');
      p.style.padding = '18px';
      p.style.color = 'rgba(255,255,255,0.8)';
      p.innerHTML = 'Ajoute <code>#url=https://...</code> dans <code>appFile</code>.';
      document.querySelector('.stremio-wrapper').appendChild(p);
    } else {
      try {
        var u = new URL(url);
        hostEl.textContent = u.host;
      } catch (e) { }

      document.title = (name ? name : 'Web App') + ' - FunnyWEB OS';
      nameEl.textContent = (icon ? (icon + ' ') : '') + (name ? name : 'Web App');
      // If the OS has a proxy-capable browser configured, use it for web apps too.
      // Otherwise fall back to direct iframe load.
      var runtimeEnv = {};
      try { runtimeEnv = (window.parent && window.parent.AETHER_RUNTIME_ENV) || window.AETHER_RUNTIME_ENV || {}; } catch (e) { runtimeEnv = {}; }
      var uvOrigin = String(runtimeEnv.AETHER_UV_ORIGIN || '').trim();
      if (uvOrigin) {
        frame.src = 'newbrowser.html#url=' + encodeURIComponent(url);
      } else {
        frame.src = url;
      }

      note.style.display = '';
      setTimeout(function () {
        note.style.transition = 'opacity 1s';
        note.style.opacity = '0';
        setTimeout(function () { try { note.remove(); } catch (e) { } }, 1000);
      }, 3500);
    }
  </script>
</body>

</html>
