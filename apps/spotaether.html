<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA — Music</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22222f;
  --line:#ffffff12;--line2:#ffffff1e;
  --w:#fff;--w2:#ffffffb3;--w3:#ffffff66;--w4:#ffffff33;
  --acc:#a78bfa;--acc2:#7c3aed;--acc3:#c4b5fd;
  --pink:#f472b6;--grn:#34d399;
  --r:18px;--tr:all .2s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--w);display:flex;flex-direction:column}

.hdr{display:flex;align-items:center;gap:16px;padding:14px 24px;border-bottom:1px solid var(--line);flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-1px;background:linear-gradient(135deg,var(--acc3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.search-wrap{flex:1;max-width:420px;position:relative}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--line2);border-radius:50px;padding:9px 16px 9px 38px;color:var(--w);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:var(--tr)}
.search-wrap input::placeholder{color:var(--w3)}
.search-wrap input:focus{border-color:var(--acc);background:var(--bg4);box-shadow:0 0 0 3px #a78bfa1a}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--w3);font-size:15px;pointer-events:none}
.hdr-tabs{display:flex;margin-left:auto;background:var(--bg3);border-radius:50px;border:1px solid var(--line2);overflow:hidden}
.hdr-tab{background:none;border:none;color:var(--w3);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;cursor:pointer;transition:var(--tr)}
.hdr-tab.on{background:var(--acc);color:#fff;border-radius:50px}
#btnSpotify.connected{background:rgba(52,211,153,0.16);color:rgba(167,243,208,0.95);border-radius:50px}
#btnSpotify.connected:hover{background:rgba(52,211,153,0.22);color:#d1fae5}
#btnJamendo.connected{background:rgba(167,139,250,0.16);color:rgba(196,181,253,0.95);border-radius:50px}
#btnJamendo.connected:hover{background:rgba(167,139,250,0.22);color:#ede9fe}

.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--line);padding:16px 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto;background:var(--bg)}
.si{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;transition:var(--tr);color:var(--w3);font-size:13px;font-weight:500;border-left:2px solid transparent}
.si:hover{color:var(--w);background:var(--bg3)}
.si.on{color:var(--acc3);border-left-color:var(--acc);background:var(--bg3)}
.si .ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sep{height:1px;background:var(--line);margin:8px 14px}
.slabel{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--w4);padding:8px 18px 2px;text-transform:uppercase;font-family:'Syne',sans-serif}
.liked-list{display:flex;flex-direction:column;gap:1px;padding:0 6px}
.li-item{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:8px;cursor:pointer;transition:var(--tr);font-size:12px;color:var(--w3)}
.li-item:hover{background:var(--bg3);color:var(--w)}
.li-item img{width:26px;height:26px;border-radius:4px;object-fit:cover;background:var(--bg4);flex-shrink:0}

.content{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

.s-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.s-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.3px}
.mb{margin-bottom:28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
.grid.list{grid-template-columns:1fr;gap:0}

.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.chip{background:var(--bg3);border:1px solid var(--line2);border-radius:50px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;transition:var(--tr);color:var(--w3)}
.chip:hover{border-color:var(--acc);color:var(--acc3)}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}

.card{background:var(--bg2);border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid var(--line);transition:var(--tr)}
.card:hover{transform:translateY(-4px);border-color:var(--line2);box-shadow:0 14px 36px #00000055}
.card-img{width:100%;aspect-ratio:1;background:var(--bg4);position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.card:hover .card-img img{transform:scale(1.06)}
.no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--w4)}
.card-ov{position:absolute;bottom:8px;right:8px;width:38px;height:38px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:0;transform:translateY(6px);transition:var(--tr);border:none;cursor:pointer;color:#fff;box-shadow:0 4px 16px #7c3aed66}
.card:hover .card-ov{opacity:1;transform:translateY(0)}
.card.playing .card-ov{opacity:1;transform:translateY(0);background:var(--grn)}
.card-body{padding:10px 12px 12px}
.card-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-meta{font-size:11px;color:var(--w3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.card-meta:hover{color:var(--acc3)}

.row{display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:10px;padding:7px 10px;border-radius:10px;cursor:pointer;transition:var(--tr);border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row:hover{background:var(--bg3)}
.row.on{background:var(--bg4)}
.row.on .rt{color:var(--acc3)}
.rn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--w4);font-size:12px;border-radius:5px;flex-shrink:0;position:relative}
.row.on .rn-t{opacity:0}
.row.on .rn::after{content:'▶';color:var(--acc3);position:absolute;font-size:9px}
.ri{width:34px;height:34px;border-radius:6px;object-fit:cover;background:var(--bg4);flex-shrink:0}
.rinfo{display:flex;align-items:center;gap:9px;min-width:0}
.rtxt{display:flex;flex-direction:column;min-width:0}
.rt{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ra{font-size:11px;color:var(--w3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.ra:hover{color:var(--acc3)}
.r-right{display:flex;align-items:center;gap:6px}
.r-dur{font-size:11px;color:var(--w4);min-width:32px;text-align:right}
.badge{font-size:10px;font-weight:800;letter-spacing:.02em;padding:2px 7px;border-radius:999px;border:1px solid var(--line2);background:rgba(255,255,255,0.06);color:var(--w3);line-height:1;user-select:none}
.badge.full{border-color:rgba(52,211,153,0.28);background:rgba(52,211,153,0.12);color:rgba(167,243,208,0.95)}
.badge.preview{border-color:rgba(244,114,182,0.28);background:rgba(244,114,182,0.12);color:rgba(251,207,232,0.95)}
.r-like{background:none;border:none;font-size:15px;cursor:pointer;opacity:.4;transition:var(--tr);padding:3px;line-height:1}
.r-like:hover,.r-like.on{opacity:1}

.hero{background:linear-gradient(135deg,#1e1330,#0f1a2e);border-radius:var(--r);padding:28px;display:flex;align-items:center;gap:22px;margin-bottom:22px;border:1px solid var(--line);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 50%,#a78bfa1a,transparent 60%);pointer-events:none}
.hero-art{width:100px;height:100px;border-radius:14px;object-fit:cover;box-shadow:0 10px 36px #00000066;flex-shrink:0;background:var(--bg4)}
.hero-text{flex:1;min-width:0;position:relative}
.hero-eye{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc3);margin-bottom:4px}
.hero-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1.1;margin-bottom:4px;letter-spacing:-.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-sub{font-size:13px;color:var(--w3);margin-bottom:14px}
.hero-btns{display:flex;gap:8px}
.btn-p{background:var(--acc);color:#fff;border:none;border-radius:50px;padding:9px 22px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr)}
.btn-p:hover{background:var(--acc2);transform:scale(1.03)}
.btn-s{background:var(--bg4);color:var(--w2);border:1px solid var(--line2);border-radius:50px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:var(--tr)}
.btn-s:hover{border-color:var(--acc);color:var(--acc3)}

.a-hero{position:relative;padding:28px;margin-bottom:20px;border-radius:var(--r);overflow:hidden;background:var(--bg2);border:1px solid var(--line)}
.a-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(50px) saturate(1.5);opacity:.25;transform:scale(1.3);pointer-events:none}
.a-hc{position:relative;display:flex;align-items:flex-end;gap:20px}
.a-av{width:120px;height:120px;border-radius:12px;object-fit:cover;background:var(--bg4);flex-shrink:0}
.a-name{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-1px;margin:4px 0}
.a-sub{font-size:12px;color:var(--w3)}
.a-btns{display:flex;gap:8px;margin-top:14px}

.player{height:76px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--line);display:grid;grid-template-columns:1fr 2fr 1fr;align-items:center;padding:0 20px;gap:16px}
.p-info{display:flex;align-items:center;gap:10px;min-width:0}
.p-art{width:46px;height:46px;border-radius:8px;object-fit:cover;background:var(--bg4);flex-shrink:0}
.p-txt{min-width:0;flex:1}
.p-track{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-artist{font-size:11px;color:var(--w3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-like{background:none;border:none;font-size:17px;cursor:pointer;transition:var(--tr);flex-shrink:0;padding:3px;opacity:.6;line-height:1}
.p-like:hover,.p-like.on{opacity:1}
.cm-btn{background:none;border:none;font-size:17px;cursor:pointer;color:var(--w3);transition:var(--tr);padding:3px;line-height:1;flex-shrink:0}
.cm-btn:hover{color:var(--acc3)}
.p-center{display:flex;flex-direction:column;align-items:center;gap:6px}
.p-ctrls{display:flex;align-items:center;gap:10px}
.ctrl{background:none;border:none;color:var(--w2);font-size:16px;cursor:pointer;transition:var(--tr);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.ctrl:hover{color:var(--w);background:var(--bg3)}
.ctrl.main{background:var(--w);color:var(--bg);width:36px;height:36px;font-size:14px}
.ctrl.main:hover{background:var(--acc3)}
.prog-row{display:flex;align-items:center;gap:8px;width:100%;max-width:380px}
.prog-t{font-size:10px;color:var(--w4);min-width:28px}
.prog-t:last-child{text-align:right}
.prog-bar{flex:1;height:4px;background:var(--bg4);border-radius:2px;cursor:pointer;position:relative;transition:height .1s}
.prog-bar:hover{height:6px;margin:-1px 0}
.prog-fill{height:100%;background:var(--acc);border-radius:2px;pointer-events:none;transition:width .1s linear}
.p-right{display:flex;align-items:center;justify-content:flex-end;gap:10px}
.vol-row{display:flex;align-items:center;gap:7px}
.vol-ico{font-size:13px;color:var(--w4)}
.vol-bar{width:72px;height:4px;background:var(--bg4);border-radius:2px;cursor:pointer}
.vol-fill{height:100%;background:var(--w3);border-radius:2px}

.eq{display:flex;align-items:flex-end;gap:2px;height:14px}
.eq span{width:3px;background:var(--acc3);border-radius:2px;animation:eq .6s ease infinite alternate}
.eq span:nth-child(1){height:7px}
.eq span:nth-child(2){height:11px;animation-delay:.15s}
.eq span:nth-child(3){height:14px;animation-delay:.3s}
@keyframes eq{to{transform:scaleY(.2)}}

.cm-panel{position:fixed;top:0;right:-370px;width:350px;height:100vh;background:var(--bg2);border-left:1px solid var(--line2);z-index:200;display:flex;flex-direction:column;transition:right .32s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px #00000066}
.cm-panel.open{right:0}
.cm-hdr{padding:18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.cm-htitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.cm-x{background:none;border:none;color:var(--w3);font-size:18px;cursor:pointer;line-height:1;flex-shrink:0}
.cm-list{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.cm-item{background:var(--bg3);border-radius:10px;padding:10px 12px}
.cm-user{font-size:11px;font-weight:600;color:var(--acc3)}
.cm-time{font-size:10px;color:var(--w4);float:right}
.cm-text{font-size:13px;color:var(--w2);line-height:1.5;margin-top:4px}
.cm-empty{text-align:center;color:var(--w4);font-size:12px;margin-top:32px}
.cm-foot{padding:14px;border-top:1px solid var(--line);display:flex;gap:8px}
.cm-foot input{flex:1;background:var(--bg3);border:1px solid var(--line2);border-radius:50px;padding:9px 13px;color:var(--w);font-family:'DM Sans',sans-serif;font-size:12px;outline:none}
.cm-foot input:focus{border-color:var(--acc)}
.cm-foot button{background:var(--acc);color:#fff;border:none;border-radius:50px;padding:9px 14px;font-weight:600;cursor:pointer;font-size:12px;transition:var(--tr)}
.cm-foot button:hover{background:var(--acc2)}

.up-panel{display:none;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r);padding:20px;margin-bottom:20px}
.up-panel.show{display:block}
.up-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.up-grid .full{grid-column:1/-1}
.flabel{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--w4);display:block;margin-bottom:5px;font-family:'Syne',sans-serif}
.finput{width:100%;background:var(--bg4);border:1px solid var(--line2);border-radius:9px;padding:10px 13px;color:var(--w);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:var(--tr)}
.finput:focus{border-color:var(--acc)}
.btn-pub{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;border-radius:50px;padding:12px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:var(--tr);width:100%}
.btn-pub:hover{opacity:.88;transform:translateY(-1px)}

.skel-card{background:var(--bg2);border-radius:var(--r);overflow:hidden;border:1px solid var(--line)}
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:6px}
@keyframes shim{to{background-position:-200% 0}}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--bg3);border:1px solid var(--line2);border-radius:50px;padding:9px 18px;font-size:12px;font-weight:500;z-index:999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);box-shadow:0 6px 24px #00000066;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{border-color:#f472b644;color:var(--pink)}
.toast.ok{border-color:#34d39944;color:var(--grn)}

@media(max-width:800px){.sidebar{width:52px}.slabel,.si span:not(.ico),.liked-list{display:none}}
@media(max-width:580px){.hdr{padding:10px 14px;gap:10px}.content{padding:14px}.player{grid-template-columns:auto 1fr;gap:10px}.p-right{display:none}.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">NOVA</div>
  <div class="search-wrap">
    <span class="search-ico">⌕</span>
    <input type="text" id="searchInput" placeholder="Titre, artiste, album…" oninput="onSearch()">
  </div>
  <div class="hdr-tabs">
    <button id="tabDiscover" class="hdr-tab on" onclick="setView('discover')">Découvrir</button>
    <button id="tabLiked" class="hdr-tab" onclick="setView('liked')">Aimés</button>
    <button id="btnJamendo" class="hdr-tab" onclick="jamendoBtn()">Jamendo</button>
    <button id="btnSpotify" class="hdr-tab" onclick="spotifyBtn()">Spotify</button>
    <button class="hdr-tab" onclick="toggleUpload()">+ Upload</button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="si on" id="navHome" onclick="setView('discover')"><span class="ico">⌂</span><span>Accueil</span></div>
    <div class="si" onclick="renderLocal()"><span class="ico">💾</span><span>Local</span></div>
    <div class="si" onclick="loadGenre('Pop')"><span class="ico">🔥</span><span>Pop</span></div>
    <div class="si" onclick="loadGenre('Hip-Hop')"><span class="ico">🎧</span><span>Rap</span></div>
    <div class="si" onclick="loadGenre('Electronic')"><span class="ico">🎛</span><span>Électro</span></div>
    <div class="si" onclick="loadGenre('R&B/Soul')"><span class="ico">🎷</span><span>R&amp;B</span></div>
    <div class="si" onclick="loadGenre('Rock')"><span class="ico">🎸</span><span>Rock</span></div>
    <div class="si" onclick="loadGenre('Jazz')"><span class="ico">🎹</span><span>Jazz</span></div>
    <div class="si" onclick="loadGenre('Latin')"><span class="ico">🪇</span><span>Latin</span></div>
    <div class="si" onclick="loadGenre('K-Pop')"><span class="ico">✨</span><span>K-Pop</span></div>
    <div class="sep"></div>
    <div class="slabel">Aimés</div>
    <div class="liked-list" id="sidebarLiked"></div>
  </nav>

  <main class="content" id="content">
    <div class="up-panel" id="uploadPanel">
      <div class="up-grid">
        <div><label class="flabel">Titre *</label><input class="finput" id="upTitle" placeholder="Nom du titre"></div>
        <div><label class="flabel">Artiste *</label><input class="finput" id="upArtist" placeholder="Nom de l'artiste"></div>
        <div><label class="flabel">Genre</label><input class="finput" id="upGenre" placeholder="Pop, Rap…"></div>
        <div><label class="flabel">URL Cover</label><input class="finput" id="upCover" placeholder="https://…"></div>
        <div class="full"><label class="flabel">Fichier Audio</label><input class="finput" type="file" id="upFile" accept="audio/*"></div>
        <div class="full"><button class="btn-pub" onclick="handleUpload()">▶ PUBLIER</button></div>
      </div>
    </div>
    <div id="mainView"></div>
  </main>
</div>

<div class="player">
  <div class="p-info">
    <img class="p-art" id="pArt" src="" alt="">
    <div class="p-txt">
      <div class="p-track" id="pTrack">—</div>
      <div class="p-artist" id="pArtist">—</div>
    </div>
    <button class="p-like" id="pLike" onclick="toggleLikeCurrent()">🤍</button>
    <button class="cm-btn" onclick="openComments()">💬</button>
  </div>
  <div class="p-center">
    <div class="p-ctrls">
      <button class="ctrl" onclick="prev()">⏮</button>
      <button class="ctrl main" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl" onclick="next()">⏭</button>
    </div>
    <div class="prog-row">
      <span class="prog-t" id="pCur">0:00</span>
      <div class="prog-bar" onclick="seek(event)"><div class="prog-fill" id="pFill"></div></div>
      <span class="prog-t" id="pDur">0:30</span>
    </div>
  </div>
  <div class="p-right">
    <div class="eq" id="eq" style="display:none"><span></span><span></span><span></span></div>
    <div class="vol-row">
      <span class="vol-ico">🔈</span>
      <div class="vol-bar" onclick="setVol(event)"><div class="vol-fill" id="vFill" style="width:80%"></div></div>
    </div>
  </div>
</div>

<div class="cm-panel" id="cmPanel">
  <div class="cm-hdr">
    <span class="cm-htitle" id="cmTitle">Commentaires</span>
    <button class="cm-x" onclick="closeComments()">×</button>
  </div>
  <div class="cm-list" id="cmList"></div>
  <div class="cm-foot">

function jamendoGetClientId() {

async function jamendoGet(path, params = {}) {
  const id = jamendoGetClientId();
  if (!id) return null;
  const clean = String(path || '').replace(/^\/+/, '').replace(/\/+$/, '');
  const qp = new URLSearchParams({ client_id: id, format: 'json', ...params }).toString();
  const url = `${JAMENDO_API_BASE}/${clean}/?${qp}`;
  try {
    const r = await fetch(url, { headers: { Accept: 'application/json' } });
    if (!r.ok) throw 0;
    const data = await r.json().catch(() => null);
    if (!data) return null;
    if (data.headers && data.headers.status && data.headers.status !== 'success') return null;
    return data;
  } catch (e) { return null; }
}

function jamendoTrack(t) {
  const jid = t && t.id ? String(t.id) : '';
  if (!jid) return null;
  const title = t && (t.name || t.title) ? String(t.name || t.title) : '';
  const artist = t && (t.artist_name || t.artist) ? String(t.artist_name || t.artist) : '';
  const cover = t && (t.image || t.album_image) ? String(t.image || t.album_image) : '';
  const audio = t && (t.audio || t.audiodownload) ? String(t.audio || t.audiodownload) : '';
  return {
    id: 'ja_' + jid,
    jid,
    title,
    artist,
    album: t && t.album_name ? String(t.album_name) : '',
    collectionId: null,
    cover,
    preview: audio,
    duration: Math.round(Number(t && t.duration ? t.duration : 0) || 0),
    src: 'jamendo',
    previewOnly: false,
    license: t && t.license_ccurl ? String(t.license_ccurl) : ''
  };
}

async function jamendoSearchTracks(query, limit = 40) {

  const items = d && Array.isArray(d.results) ? d.results : [];
  return items.map(jamendoTrack).filter(Boolean);
}

// -- LOCAL LIBRARY (your own files) --
let localDbPromise = null;
let localDbTracksCache = null;

function localInvalidateCache() {
  localDbTracksCache = null;
}

function localIsAudioName(name) {
  const n = String(name || '').toLowerCase();
  return /\.(mp3|m4a|aac|wav|ogg|opus|flac)$/i.test(n);
}

function localInferMetaFromName(name) {
  const base = String(name || '').replace(/\.[^/.]+$/, '').replace(/[_]+/g, ' ').trim();
  if (!base) return { title: 'Piste locale', artist: 'Local' };
  const parts = base.split(' - ').map(s => s.trim()).filter(Boolean);
  if (parts.length >= 2) {
    const artist = parts.shift() || 'Local';
    const title = parts.join(' - ') || base;
    return { title, artist };
  }
  return { title: base, artist: 'Local' };
}

function localRecToTrack(rec) {
  if (!rec || !rec.id) return null;
  return {
    id: 'lo_' + String(rec.id),
    lid: String(rec.id),
    title: rec.title || '',
    artist: rec.artist || 'Local',
    album: '',
    collectionId: null,
    cover: rec.cover || '',
    preview: '',
    duration: 0,
    src: 'local',
    previewOnly: false,
    handle: rec.handle || null,
    file: null
  };
}

function localOpenDb() {
  if (localDbPromise) return localDbPromise;
  localDbPromise = new Promise((resolve, reject) => {
    try {
      const req = indexedDB.open(LOCAL_DB_NAME, LOCAL_DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(LOCAL_DB_STORE)) {
          const store = db.createObjectStore(LOCAL_DB_STORE, { keyPath: 'id' });
          store.createIndex('addedAt', 'addedAt', { unique: false });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error || new Error('IndexedDB error'));
    } catch (e) {
      reject(e);
    }
  });
  return localDbPromise;
}

async function localDbGetAll() {
  try {
    const db = await localOpenDb();
    return await new Promise((resolve) => {
      const tx = db.transaction(LOCAL_DB_STORE, 'readonly');
      const store = tx.objectStore(LOCAL_DB_STORE);
      const req = store.getAll();
      req.onsuccess = () => resolve(Array.isArray(req.result) ? req.result : []);
      req.onerror = () => resolve([]);
    });
  } catch (e) {
    return [];
  }
}

async function localDbPut(rec) {
  try {
    const db = await localOpenDb();
    return await new Promise((resolve) => {
      const tx = db.transaction(LOCAL_DB_STORE, 'readwrite');
      const store = tx.objectStore(LOCAL_DB_STORE);
      const req = store.put(rec);
      req.onsuccess = () => resolve(true);
      req.onerror = () => resolve(false);
    });
  } catch (e) {
    return false;
  }
}

async function localGetDbTracks() {
  if (Array.isArray(localDbTracksCache)) return localDbTracksCache;
  const recs = await localDbGetAll();
  localDbTracksCache = recs.map(localRecToTrack).filter(Boolean);
  return localDbTracksCache;
}

async function localGetAllTracks() {
  const dbTracks = await localGetDbTracks();
  const session = Array.isArray(S.sessionLocal) ? S.sessionLocal : [];
  return [...dbTracks, ...session];
}

async function localSearchTracks(query, limit = 60) {
  const q = String(query || '').trim().toLowerCase();
  if (!q) return [];
  const all = await localGetAllTracks();
  const out = all.filter(t => {
    const hay = `${t.title || ''} ${t.artist || ''}`.toLowerCase();
    return hay.includes(q);
  });
  return out.slice(0, Math.max(0, Number(limit) || 60));
}

async function localArtistTracks(artistName, limit = 80) {
  const name = String(artistName || '').trim().toLowerCase();
  if (!name) return [];
  const all = await localGetAllTracks();
  const exact = all.filter(t => String(t.artist || '').trim().toLowerCase() === name);
  if (exact.length) return exact.slice(0, Math.max(0, Number(limit) || 80));
  const partial = all.filter(t => String(t.artist || '').toLowerCase().includes(name));
  return partial.slice(0, Math.max(0, Number(limit) || 80));
}

function localPickFilesInput({ multiple = true, directory = false } = {}) {
  return new Promise((resolve) => {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'audio/*';
    inp.multiple = !!multiple;
    if (directory) inp.setAttribute('webkitdirectory', '');
    inp.onchange = () => {
      const files = Array.from(inp.files || []);
      resolve(files);
    };
    inp.click();
  });
}

async function localImportFiles() {
  try {
    let usedPicker = false;
    if (window.showOpenFilePicker) {

async function localImportFolder() {
  try {
    let usedPicker = false;
    if (window.showDirectoryPicker) {
      try {
        const dir = await window.showDirectoryPicker();
        const handles = await localWalkDirectory(dir);
        const added = await localAddFileHandles(handles);
        usedPicker = true;
        if (added) toast(`Local: +${added} fichier(s)`, 'ok');
        else toast('Local: aucun fichier audio', 'err');
      } catch (e) {
        usedPicker = false;
      }
    }
    if (!usedPicker) {
      const files = await localPickFilesInput({ multiple: true, directory: true });
      const added = localAddSessionFiles(files);
      if (added) toast(`Local: +${added} fichier(s) (session)`, 'ok');
      else toast('Local: aucun fichier audio', 'err');
    }
  } catch (e) {}
  updateSidebarLiked();
  renderLocal();
}

async function localWalkDirectory(dirHandle) {
  const out = [];
  try {
    if (!dirHandle || dirHandle.kind !== 'directory' || !dirHandle.values) return out;
    for await (const entry of dirHandle.values()) {
      if (!entry) continue;
      if (entry.kind === 'file') out.push(entry);
      else if (entry.kind === 'directory') {
        const nested = await localWalkDirectory(entry);
        out.push(...nested);
      }
    }
  } catch (e) {}
  return out;
}

async function localAddFileHandles(handles) {
  const list = Array.isArray(handles) ? handles : [];
  if (!list.length) return 0;
  let added = 0;
  for (const h of list) {
    try {
      if (!h || h.kind !== 'file' || !h.getFile) continue;
      const f = await h.getFile();
      if (!f) continue;
      const isAudio = (f.type && String(f.type).startsWith('audio/')) || localIsAudioName(f.name);
      if (!isAudio) continue;
      const meta = localInferMetaFromName(f.name);
      const recId = `${f.name}::${f.size}::${f.lastModified}`;
      const ok = await localDbPut({
        id: recId,
        title: meta.title,
        artist: meta.artist,
        cover: '',
        handle: h,
        addedAt: Date.now()
      });
      if (ok) added++;
    } catch (e) {}
  }
  if (added) localInvalidateCache();
  return added;
}

function localAddSessionFiles(files) {
  const list = Array.isArray(files) ? files : [];
  let added = 0;
  for (const f of list) {
    try {
      if (!f) continue;
      const isAudio = (f.type && String(f.type).startsWith('audio/')) || localIsAudioName(f.name);
      if (!isAudio) continue;
      const meta = localInferMetaFromName(f.name);
      const sid = `sess_${f.name}::${f.size}::${f.lastModified}::${Math.random().toString(16).slice(2)}`;
      const t = {
        id: 'lo_' + sid,
        lid: sid,
        title: meta.title,
        artist: meta.artist,
        album: '',
        collectionId: null,
        cover: '',
        preview: '',
        duration: 0,
        src: 'local',
        previewOnly: false,
        handle: null,
        file: f
      };
      S.sessionLocal.push(t);
      added++;
    } catch (e) {}
  }
  return added;
}

async function localPlayTrack(t) {
  try {
    if (!t) return;
    let file = null;
    if (t.file instanceof File) file = t.file;
    else if (t.handle && t.handle.getFile) {
      try {
        if (t.handle.queryPermission) {
          const q = await t.handle.queryPermission({ mode: 'read' });
          if (q !== 'granted' && t.handle.requestPermission) {
            const r = await t.handle.requestPermission({ mode: 'read' });
            if (r !== 'granted') { toast('Accès fichier refusé', 'err'); return; }
          }
        }
      } catch (e) {}
      file = await t.handle.getFile();
    }
    if (!file) { toast('Fichier local indisponible', 'err'); return; }
    const url = URL.createObjectURL(file);
    const prev = S.blobUrl || '';
    S.blobUrl = url;
    try { if (prev && prev !== url && String(prev).startsWith('blob:')) URL.revokeObjectURL(prev); } catch (e) {}
    audioEnginePlay(t, url);
  } catch (e) {
    toast('Lecture locale impossible', 'err');
  }
}

function audioEnginePlay(t, srcUrl) {
  // Switch to HTML audio engine
  S.engine = 'audio';
  spotifyStopTick();
  spotifyPause();
  try {
    if (S.blobUrl && srcUrl !== S.blobUrl && String(S.blobUrl).startsWith('blob:')) {
      URL.revokeObjectURL(S.blobUrl);
      S.blobUrl = '';
    }
  } catch (e) {}
  if (!srcUrl) { toast('Audio indisponible', 'err'); return; }
  aud.src = srcUrl;
  aud.volume = S.volume;
  aud.play().catch(()=>toast('Lecture bloquée', 'err'));
  S.playing = true;
  ge('pTrack').textContent  = t.title  || '—';
  ge('pArtist').textContent = t.artist || '—';
  ge('pArt').src = t.cover || '';
  ge('pFill').style.width = '0%';
  ge('pCur').textContent = '0:00';
  ge('pDur').textContent = t.duration ? fmt(t.duration) : '—:—';
  ge('playBtn').textContent = '⏸';
  ge('eq').style.display = 'flex';
  refreshLikeBtn();
  if (ge('cmPanel').classList.contains('open')) renderComments();
  if (t.previewOnly) toast(`Extrait 30s • ${t.title}`, 'err');
  else toast(`♪ ${t.title}`, 'ok');
}

    if (!r.ok) throw 0;

}

async function itunesLookup(id) {

// ── API: Audius (full streams) ──
async function audiusGet(path, params = {}) {
  const qp = new URLSearchParams({ app_name: AUDIUS_APP_NAME, ...params }).toString();
  const url = `${AUDIUS_BASE}/${path}${qp ? `?${qp}` : ''}`;
  try {
    const r = await fetch(url, { headers: { Accept: 'application/json' } });
    if (!r.ok) throw 0;
    return await r.json();
  } catch (e) { return null; }
}

function audiusTrack(t) {
  const aid = t && (t.id || t.track_id) ? String(t.id || t.track_id) : '';
  if (!aid) return null;
  const artwork = t && t.artwork ? t.artwork : null;
  const cover = artwork ? (artwork['480x480'] || artwork['150x150'] || artwork['1000x1000'] || '') : '';
  const artistName = t && t.user ? (t.user.name || t.user.handle || 'Unknown Artist') : 'Unknown Artist';
  return {
    id: 'au_' + aid,
    aid,
    title: t && t.title ? String(t.title) : '',
    artist: String(artistName || ''),
    album: '',
    collectionId: null,
    cover,
    preview: `${AUDIUS_BASE}/tracks/${encodeURIComponent(aid)}/stream?app_name=${encodeURIComponent(AUDIUS_APP_NAME)}`,
    duration: Math.round(Number(t && t.duration ? t.duration : 0) || 0),
    src: 'audius',
    previewOnly: false,
    genre: t && t.genre ? String(t.genre) : ''
  };
}

async function audiusTrending(params = {}) {
  return await audiusGet('tracks/trending', params);
}

async function audiusSearchTracks(query, limit = 40) {
  const q = String(query || '').trim();
  if (!q) return null;
  return await audiusGet('tracks/search', { query: q, limit: String(limit) });
}

// ── SPOTIFY (full catalog via login) ──
function spotifyGetClientId() {
  try { return String(localStorage.getItem(SPOTIFY_CLIENT_ID_LS_KEY) || '').trim(); } catch (e) { return ''; }
}

function spotifySetClientId(id) {
  try { localStorage.setItem(SPOTIFY_CLIENT_ID_LS_KEY, String(id || '').trim()); } catch (e) {}
}

function spotifyGetRedirectUri() {
  try {
    const u = new URL(window.location.href);
    u.search = '';
    u.hash = '';
    return u.toString();
  } catch (e) {
    return `${window.location.origin}${window.location.pathname}`;
  }
}

function spotifyHasAuth() {
  return !!(S.spotify && (S.spotify.accessToken || S.spotify.refreshToken));
}

function spotifyTokenValid() {
  const exp = Number(S.spotify && S.spotify.expiresAt ? S.spotify.expiresAt : 0) || 0;
  return !!(S.spotify && S.spotify.accessToken && exp && Date.now() < (exp - 20000));
}

async function spotifyEnsureClientId() {
  let id = spotifyGetClientId();
  if (id) return id;
  const redirectUri = spotifyGetRedirectUri();
  const msg =
    `Spotify Client ID manquant.\n\n` +
    `1) Crée une app sur https://developer.spotify.com/dashboard\n` +
    `2) Ajoute ce Redirect URI:\n${redirectUri}\n\n` +
    `Colle ici le Client ID :`;
  id = String(prompt(msg, '') || '').trim();
  if (!id) return '';
  spotifySetClientId(id);
  return id;
}

function updateSpotifyButton() {
  const btn = ge('btnSpotify');
  if (!btn) return;
  const ok = spotifyTokenValid();
  const any = spotifyHasAuth();
  btn.classList.toggle('connected', ok);
  btn.textContent = ok ? 'Spotify ✓' : (any ? 'Spotify…' : 'Spotify');
  btn.title = ok
    ? 'Spotify connecté (Premium requis pour lecture full)'
    : 'Connecter Spotify (Premium requis pour lecture full)';
}

function spotifyDisconnect() {
  try { localStorage.removeItem(SPOTIFY_AUTH_LS_KEY); } catch (e) {}
  S.spotify = { accessToken: '', refreshToken: '', expiresAt: 0 };
  spotifyStopTick();
  try { if (S.spotifyPlayer) S.spotifyPlayer.disconnect(); } catch (e) {}
  S.spotifyPlayer = null;
  S.spotifyDeviceId = '';
  spotifyPlayerReadyPromise = null;
  updateSpotifyButton();
  toast('Spotify déconnecté', 'ok');
}

async function spotifyBtn() {
  if (spotifyTokenValid()) {
    if (confirm('Déconnecter Spotify ?')) spotifyDisconnect();
    return;
  }
  if (spotifyHasAuth()) {
    const tok = await spotifyEnsureToken();
    if (tok) {
      updateSpotifyButton();
      toast('Spotify prêt', 'ok');
      return;
    }
  }
  await spotifyConnect();
}

function spotifyRandomString(len = 64) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let out = '';
  try {
    const bytes = new Uint8Array(len);
    crypto.getRandomValues(bytes);
    for (let i = 0; i < len; i++) out += chars[bytes[i] % chars.length];
    return out;
  } catch (e) {
    for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
    return out;
  }
}

async function spotifyPkceChallenge(verifier) {
  const data = new TextEncoder().encode(String(verifier || ''));
  const digest = await crypto.subtle.digest('SHA-256', data);
  const bytes = Array.from(new Uint8Array(digest));
  const b64 = btoa(String.fromCharCode.apply(null, bytes));
  return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
}

async function spotifyConnect() {
  const clientId = await spotifyEnsureClientId();
  if (!clientId) { toast('Client ID Spotify manquant', 'err'); return; }

  const redirectUri = spotifyGetRedirectUri();
  const verifier = spotifyRandomString(64);
  const challenge = await spotifyPkceChallenge(verifier);
  const state = spotifyRandomString(18);

  // Use localStorage so the flow also works when auth happens in a popup window.
  try { localStorage.setItem(SPOTIFY_PKCE_VERIFIER_KEY, verifier); } catch (e) {}
  try { localStorage.setItem(SPOTIFY_PKCE_STATE_KEY, state); } catch (e) {}

  const params = new URLSearchParams({
    response_type: 'code',
    client_id: clientId,
    scope: SPOTIFY_SCOPES,
    redirect_uri: redirectUri,
    state,
    code_challenge_method: 'S256',
    code_challenge: challenge
  });
  const authUrl = `${SPOTIFY_AUTH_BASE}/authorize?${params.toString()}`;

  // Spotify auth pages often refuse to render inside iframes; prefer a popup when embedded.
  let inIframe = false;
  try { inIframe = window.top && window.top !== window; } catch (e) { inIframe = true; }
  if (inIframe) {
    const w = window.open(authUrl, 'spotify_auth', 'width=520,height=720');
    if (!w) window.location.href = authUrl;
    else toast('Spotify: fenêtre de connexion ouverte', 'ok');
  } else {
    window.location.href = authUrl;
  }
}

async function spotifyHandleAuthRedirect() {
  let url;
  try { url = new URL(window.location.href); } catch (e) { return; }
  const code = url.searchParams.get('code');
  const state = url.searchParams.get('state');
  const error = url.searchParams.get('error');
  if (error) {
    toast(`Spotify: ${error}`, 'err');
    url.searchParams.delete('error');
    try { history.replaceState({}, '', url.toString()); } catch (e) {}
    return;
  }
  if (!code) return;

  const expectedState = (() => { try { return localStorage.getItem(SPOTIFY_PKCE_STATE_KEY) || ''; } catch (e) { return ''; } })();
  const verifier = (() => { try { return localStorage.getItem(SPOTIFY_PKCE_VERIFIER_KEY) || ''; } catch (e) { return ''; } })();
  try { localStorage.removeItem(SPOTIFY_PKCE_STATE_KEY); } catch (e) {}
  try { localStorage.removeItem(SPOTIFY_PKCE_VERIFIER_KEY); } catch (e) {}

  if (!verifier || !state || expectedState !== state) {
    toast('Spotify: vérification échouée', 'err');
    url.searchParams.delete('code');
    url.searchParams.delete('state');
    try { history.replaceState({}, '', url.toString()); } catch (e) {}
    return;
  }

  const clientId = spotifyGetClientId();
  const redirectUri = spotifyGetRedirectUri();
  if (!clientId) {
    toast('Spotify: client id manquant', 'err');
    return;
  }

  const body = new URLSearchParams({
    client_id: clientId,
    grant_type: 'authorization_code',
    code,
    redirect_uri: redirectUri,
    code_verifier: verifier
  });

  let resp, data;
  try {
    resp = await fetch(`${SPOTIFY_AUTH_BASE}/api/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body
    });
    data = await resp.json().catch(() => ({}));
  } catch (e) {
    toast('Spotify: token impossible', 'err');
    return;
  }
  if (!resp || !resp.ok || !data || !data.access_token) {
    toast('Spotify: token refusé', 'err');
    console.error('Spotify token error', data);
    return;
  }

  S.spotify.accessToken = String(data.access_token || '');
  S.spotify.refreshToken = String(data.refresh_token || S.spotify.refreshToken || '');
  S.spotify.expiresAt = Date.now() + (Number(data.expires_in) || 3600) * 1000;
  saveLS(SPOTIFY_AUTH_LS_KEY, S.spotify);

  url.searchParams.delete('code');
  url.searchParams.delete('state');
  try { history.replaceState({}, '', url.toString()); } catch (e) {}

  updateSpotifyButton();
  toast('Spotify connecté', 'ok');

  // If we came from a popup auth window, close it.
  try {
    if (window.opener && window.opener !== window) window.close();
  } catch (e) {}
}

async function spotifyRefreshToken() {
  const clientId = spotifyGetClientId();
  if (!clientId || !S.spotify || !S.spotify.refreshToken) return '';
  const body = new URLSearchParams({
    client_id: clientId,
    grant_type: 'refresh_token',
    refresh_token: String(S.spotify.refreshToken || '')
  });
  try {
    const resp = await fetch(`${SPOTIFY_AUTH_BASE}/api/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok || !data || !data.access_token) return '';
    S.spotify.accessToken = String(data.access_token || '');
    if (data.refresh_token) S.spotify.refreshToken = String(data.refresh_token || '');
    S.spotify.expiresAt = Date.now() + (Number(data.expires_in) || 3600) * 1000;
    saveLS(SPOTIFY_AUTH_LS_KEY, S.spotify);
    updateSpotifyButton();
    return S.spotify.accessToken;
  } catch (e) {
    return '';
  }
}

async function spotifyEnsureToken() {
  if (spotifyTokenValid()) return S.spotify.accessToken;
  if (S.spotify && S.spotify.refreshToken) {
    const t = await spotifyRefreshToken();
    if (t) return t;
  }
  return '';
}

async function spotifyApi(path, options = {}) {
  const tok = await spotifyEnsureToken();
  if (!tok) throw new Error('Spotify non connecté');
  const headers = { ...(options.headers || {}) };
  headers.Authorization = `Bearer ${tok}`;
  headers.Accept = headers.Accept || 'application/json';

  let body = options.body;
  if (body !== undefined && body !== null && typeof body !== 'string' && !(body instanceof FormData) && !(body instanceof URLSearchParams)) {
    headers['Content-Type'] = headers['Content-Type'] || 'application/json';
    body = JSON.stringify(body);
  }

  const resp = await fetch(`${SPOTIFY_API_BASE}${path}`, { ...options, headers, body });
  if (resp.status === 204) return null;
  const data = await resp.json().catch(() => null);
  if (!resp.ok) {
    const msg = data && data.error && data.error.message ? data.error.message : `Spotify HTTP ${resp.status}`;
    throw new Error(msg);
  }
  return data;
}

function spotifyMapTrack(t) {
  const sid = t && t.id ? String(t.id) : '';
  if (!sid) return null;
  const artists = Array.isArray(t.artists) ? t.artists.map(a => a && a.name ? String(a.name) : '').filter(Boolean) : [];
  const cover = Array.isArray(t.album && t.album.images) && t.album.images[0] ? String(t.album.images[0].url || '') : '';
  return {
    id: 'sp_' + sid,
    sid,
    uri: t.uri || `spotify:track:${sid}`,
    title: t.name || '',
    artist: artists[0] || '',
    album: t.album && t.album.name ? String(t.album.name) : '',
    collectionId: null,
    cover,
    preview: '',
    duration: Math.round(Number(t.duration_ms || 0) / 1000),
    src: 'spotify',
    previewOnly: false
  };
}

async function spotifySearchTracks(query, limit = 25) {
  if (!spotifyHasAuth()) return [];
  const q = String(query || '').trim();
  if (!q) return [];
  try {
    const data = await spotifyApi(`/search?q=${encodeURIComponent(q)}&type=track&limit=${encodeURIComponent(String(limit))}`);
    const items = data && data.tracks && Array.isArray(data.tracks.items) ? data.tracks.items : [];
    return items.map(spotifyMapTrack).filter(Boolean);
  } catch (e) {
    return [];
  }
}

async function spotifyLoadSdk() {
  if (window.Spotify && window.Spotify.Player) return;
  if (spotifySdkPromise) return spotifySdkPromise;
  spotifySdkPromise = new Promise((resolve, reject) => {
    if (window.Spotify && window.Spotify.Player) { resolve(); return; }
    let done = false;
    window.onSpotifyWebPlaybackSDKReady = () => {
      done = true;
      resolve();
    };
    const s = document.createElement('script');
    s.src = 'https://sdk.scdn.co/spotify-player.js';
    s.async = true;
    s.onload = () => { setTimeout(() => { if (!done) resolve(); }, 0); };
    s.onerror = () => reject(new Error('Spotify SDK load failed'));
    document.head.appendChild(s);
    setTimeout(() => { if (!done) reject(new Error('Spotify SDK timeout')); }, 12000);
  });
  return spotifySdkPromise;
}

async function spotifyTransferPlayback(deviceId) {
  const id = String(deviceId || '').trim();
  if (!id) return;
  try {
    await spotifyApi('/me/player', { method: 'PUT', body: { device_ids: [id], play: false } });
  } catch (e) {
    const msg = String(e && e.message ? e.message : '');
    if (msg) toast(`Spotify: ${msg}`, 'err');
  }
}

async function spotifyEnsurePlayer() {
  const tok = await spotifyEnsureToken();
  if (!tok) throw new Error('Spotify non connecté');

  if (S.spotifyPlayer && S.spotifyDeviceId) return S.spotifyPlayer;
  if (spotifyPlayerReadyPromise) return spotifyPlayerReadyPromise;

  spotifyPlayerReadyPromise = (async () => {
    await spotifyLoadSdk();
    if (!(window.Spotify && window.Spotify.Player)) throw new Error('Spotify SDK indisponible');

    let readyResolve = null;
    let readyReject = null;
    const readyPromise = new Promise((resolve, reject) => { readyResolve = resolve; readyReject = reject; });
    // Prevent unhandled rejections if the outer flow aborts before awaiting.
    readyPromise.catch(() => {});
    const readyTimeout = setTimeout(() => {
      try { readyReject && readyReject(new Error('Spotify: device timeout')); } catch (e) {}
    }, 12000);

    const player = new Spotify.Player({
      name: 'NOVA • AetherOS',
      getOAuthToken: async cb => {
        const t = await spotifyEnsureToken();
        cb(t || '');
      },
      volume: S.volume
    });

    player.addListener('ready', ({ device_id }) => {
      try {
        clearTimeout(readyTimeout);
        S.spotifyDeviceId = device_id;
        spotifyTransferPlayback(device_id);
        updateSpotifyButton();
        spotifyStartTick();
        readyResolve && readyResolve(device_id);
      } catch (e) {}
    });
    player.addListener('not_ready', ({ device_id }) => {
      if (S.spotifyDeviceId === device_id) S.spotifyDeviceId = '';
    });
    player.addListener('initialization_error', ({ message }) => {
      console.error('Spotify init error', message);
      try { clearTimeout(readyTimeout); } catch (e) {}
      try { readyReject && readyReject(new Error('Spotify: init erreur')); } catch (e) {}
      toast('Spotify: init erreur', 'err');
    });
    player.addListener('authentication_error', ({ message }) => {
      console.error('Spotify auth error', message);
      try { clearTimeout(readyTimeout); } catch (e) {}
      try { readyReject && readyReject(new Error('Spotify: auth erreur')); } catch (e) {}
      toast('Spotify: auth erreur', 'err');
    });
    player.addListener('account_error', ({ message }) => {
      console.error('Spotify account error', message);
      try { clearTimeout(readyTimeout); } catch (e) {}
      try { readyReject && readyReject(new Error('Spotify Premium requis')); } catch (e) {}
      toast('Spotify Premium requis', 'err');
    });
    player.addListener('playback_error', ({ message }) => {
      console.error('Spotify playback error', message);
      toast('Spotify: lecture impossible', 'err');
    });
    player.addListener('player_state_changed', (state) => {
      spotifyApplyPlayerState(state);
    });

    const ok = await player.connect().catch(() => false);
    if (!ok) throw new Error('Spotify: connexion refusée');
    S.spotifyPlayer = player;
    await readyPromise;
    return player;
  })();

  return spotifyPlayerReadyPromise;
}

function spotifyApplyPlayerState(state) {
  if (!state || S.engine !== 'spotify') return;
  const dur = Number(state.duration || 0) || 0;
  const pos = Number(state.position || 0) || 0;
  S.spotifyPosMs = pos;
  S.spotifyDurMs = dur;

  if (dur > 0) ge('pFill').style.width = (pos / dur * 100) + '%';
  ge('pCur').textContent = fmt(pos / 1000);
  ge('pDur').textContent = fmt(dur / 1000);

  S.playing = !state.paused;
  ge('playBtn').textContent = state.paused ? '▶' : '⏸';
  ge('eq').style.display = state.paused ? 'none' : 'flex';
}

function spotifyStartTick() {
  if (spotifyTickTimer) return;
  spotifyTickTimer = setInterval(async () => {
    if (S.engine !== 'spotify' || !S.spotifyPlayer) return;
    try {
      const state = await S.spotifyPlayer.getCurrentState();
      if (state) spotifyApplyPlayerState(state);
    } catch (e) {}
  }, 800);
}

function spotifyStopTick() {
  if (!spotifyTickTimer) return;
  clearInterval(spotifyTickTimer);
  spotifyTickTimer = null;
}

async function spotifyPlayTrack(t) {
  const track = t || null;
  if (!track || track.src !== 'spotify' || !track.uri) { toast('Spotify: track invalide', 'err'); return; }

  try {
    await spotifyEnsurePlayer();
  } catch (e) {
    toast(String(e && e.message ? e.message : 'Spotify indisponible'), 'err');
    return;
  }

  if (!S.spotifyDeviceId) { toast('Spotify: device non prêt', 'err'); return; }

  // Stop HTML audio when using Spotify
  try { aud.pause(); } catch (e) {}

  try {
    if (S.spotifyPlayer && typeof S.spotifyPlayer.activateElement === 'function') {
      await S.spotifyPlayer.activateElement();
    }
  } catch (e) {}

  S.engine = 'spotify';
  S.current = track;
  S.playing = true;
  ge('pTrack').textContent = track.title || '—';
  ge('pArtist').textContent = track.artist || '—';
  ge('pArt').src = track.cover || '';
  ge('pFill').style.width = '0%';
  ge('pCur').textContent = '0:00';
  ge('pDur').textContent = fmt(track.duration || 0);
  ge('playBtn').textContent = '⏸';
  ge('eq').style.display = 'flex';
  refreshLikeBtn();

  try {
    await spotifyApi(`/me/player/play?device_id=${encodeURIComponent(S.spotifyDeviceId)}`, {
      method: 'PUT',
      body: { uris: [track.uri] }
    });
    toast(`♪ ${track.title}`, 'ok');
  } catch (e) {
    const msg = String(e && e.message ? e.message : 'play error');
    if (/premium/i.test(msg)) toast('Spotify Premium requis', 'err');
    else if (/no active device/i.test(msg)) toast('Spotify: démarre une musique sur Spotify puis réessaie', 'err');
    else toast(`Spotify: ${msg}`, 'err');
  }
}

async function spotifyTogglePlay() {
  if (!S.spotifyPlayer) {
    try { await spotifyEnsurePlayer(); } catch (e) { toast('Spotify indisponible', 'err'); return; }
  }
  try {
    await S.spotifyPlayer.togglePlay();
    const state = await S.spotifyPlayer.getCurrentState();
    if (state) spotifyApplyPlayerState(state);
  } catch (e) {}
}

async function spotifyPause() {

}

async function spotifySeekTo(ms) {

async function spotifySetVolume(v) {

      <div style="margin:6px 0 14px;color:var(--w4);font-size:12px">
        Pour du <b>FULL gratuit</b> (Creative Commons / indé), clique sur <b style="cursor:pointer;color:var(--acc3)" onclick="jamendoBtn()">Jamendo</b> (Client ID gratuit).

        Pour avoir vraiment <b>FULL</b> (catalogue complet, ex: Michael Jackson), clique sur <b style="cursor:pointer;color:var(--acc3)" onclick="spotifyBtn()">Spotify</b> (Premium requis).

function rowsHTML(tracks) {
  return tracks.map((t,i) => {
    const on = S.current?.id===t.id;
    const lk = S.liked.includes(t.id);
    const badge = t.previewOnly
      ? `<span class="badge preview" title="Extrait iTunes (~30s)">30s</span>`

    return `<div class="row${on?' on':''}" onclick="P('${t.id}')">
      <div class="rn"><span class="rn-t">${i+1}</span>${on?'<div class="eq"><span></span><span></span><span></span></div>':''}</div>
      <div class="rinfo">
        <img class="ri" src="${t.cover}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">
        <div class="rtxt">
          <div class="rt">${esc(t.title)}</div>
          <div class="ra" onclick="event.stopPropagation();loadArtist('${esc(t.artist)}')">${esc(t.artist)}</div>
        </div>
      </div>
      <div class="r-right">
        ${t.collectionId?`<span style="font-size:10px;color:var(--w4);cursor:pointer;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" onclick="event.stopPropagation();loadAlbum(${t.collectionId})" title="${esc(t.album)}">${esc(t.album)}</span>`:''}

function skels(n) {
  return `<div class="grid">${Array.from({length:n},()=>`
    <div class="skel-card"><div style="aspect-ratio:1" class="sk"></div>
    <div style="height:11px;margin:8px 10px 4px" class="sk"></div>
    <div style="height:9px;margin:0 10px 10px;width:55%" class="sk"></div></div>`).join('')}</div>`;
}

// ── PLAYER ──
function setQueue(tracks, idx) { S.queue = tracks; S.qIdx = idx; }

// Central play function — looks up track by id from allTracks
function P(id) {
  const t = S.allTracks.find(a => a.id === id) || S.queue.find(a => a.id === id);
  if (!t) return;
  const qi = S.queue.findIndex(a => a.id === id);
  if (qi >= 0) S.qIdx = qi; else { S.queue.push(t); S.qIdx = S.queue.length-1; }
  S.current = t;

  if (t.src === 'spotify') {
    spotifyPlayTrack(t);
    return;
  }

  if (t.src === 'local') { localPlayTrack(t); return; }
  audioEnginePlay(t, t.preview);
}

function togglePlay() {
  if (!S.current) return;
  if (S.engine === 'spotify') { spotifyTogglePlay(); return; }
  if (S.playing) { aud.pause(); S.playing=false; ge('playBtn').textContent='▶'; ge('eq').style.display='none'; }
  else { aud.play(); S.playing=true; ge('playBtn').textContent='⏸'; ge('eq').style.display='flex'; }
}

function next() {
  if (!S.queue.length) return;
  S.qIdx = (S.qIdx+1) % S.queue.length;
  P(S.queue[S.qIdx].id);
}

function prev() {
  if (!S.current) return;
  if (S.engine === 'spotify') {
    if ((Number(S.spotifyPosMs) || 0) > 3000) { spotifySeekTo(0); return; }
  } else {
    if (aud.currentTime > 3) { aud.currentTime=0; return; }
  }
  S.qIdx = ((S.qIdx-1) + S.queue.length) % S.queue.length;
  P(S.queue[S.qIdx].id);
}

function onTime() {
  if (!aud.duration) return;
  ge('pFill').style.width = (aud.currentTime/aud.duration*100)+'%';
  ge('pCur').textContent = fmt(aud.currentTime);
}

function seek(e) {
  const r = e.currentTarget.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  if (S.engine === 'spotify') {
    const dur = Number(S.spotifyDurMs || (S.current && S.current.duration ? (S.current.duration * 1000) : 0)) || 0;
    if (!dur) return;
    spotifySeekTo(ratio * dur);
    return;
  }
  if (!aud.duration) return;
  aud.currentTime = ratio * aud.duration;
}

function setVol(e) {
  const r = e.currentTarget.getBoundingClientRect();
  S.volume = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width));
  aud.volume = S.volume;
  ge('vFill').style.width = (S.volume*100)+'%';
  if (S.spotifyPlayer) spotifySetVolume(S.volume);
}

// ── LIKES ──
function toggleLike(id) {
  const i = S.liked.indexOf(id);
  if (i>=0) { S.liked.splice(i,1); toast('Retiré'); }
  else { S.liked.push(id); toast('Aimé ❤️','ok'); }
  saveLS('nova_liked', S.liked);
  refreshLikeBtn();
  document.querySelectorAll(`[data-like="${id}"]`).forEach(b => {
    const on = S.liked.includes(id);
    b.textContent = on ? '❤️':'🤍';
    b.classList.toggle('on', on);
  });
  updateSidebarLiked();
}

function toggleLikeCurrent() { if(S.current) toggleLike(S.current.id); }

function refreshLikeBtn() {
  const b = ge('pLike');
  if (!S.current) return;
  const on = S.liked.includes(S.current.id);
  b.textContent = on ? '❤️':'🤍';
  b.classList.toggle('on', on);
}

function updateSidebarLiked() {
  const el = ge('sidebarLiked');
  const lk = S.allTracks.filter(t=>S.liked.includes(t.id)).slice(0,7);
  el.innerHTML = lk.map(t=>`<div class="li-item" onclick="P('${t.id}')">
    <img src="${t.cover}" alt="" onerror="this.style.display='none'">
    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</span>
  </div>`).join('');
}

// ── COMMENTS ──
function openComments() { ge('cmPanel').classList.add('open'); renderComments(); }
function closeComments() { ge('cmPanel').classList.remove('open'); }

function renderComments() {
  const t = S.current;
  const list = ge('cmList');
  if (!t) { list.innerHTML='<div class="cm-empty">Lance une musique d\'abord !</div>'; return; }
  ge('cmTitle').textContent = t.title || 'Commentaires';
  const cms = S.comments[t.id] || [];
  if (!cms.length) { list.innerHTML='<div class="cm-empty">Aucun commentaire. Sois le premier !</div>'; return; }
  list.innerHTML = cms.map(c=>`<div class="cm-item">
    <div><span class="cm-user">${esc(c.user)}</span><span class="cm-time">${c.time}</span></div>
    <div class="cm-text">${esc(c.text)}</div>
  </div>`).join('');
  list.scrollTop = list.scrollHeight;
}

function sendComment() {
  const inp = ge('cmInput');
  const txt = inp.value.trim();
  if (!txt || !S.current) return;
  const id = S.current.id;
  if (!S.comments[id]) S.comments[id] = [];
  S.comments[id].push({user:'Moi', text:txt, time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  saveLS('nova_comments', S.comments);
  inp.value = '';
  renderComments();
}

// ── UPLOAD ──
function toggleUpload() { ge('uploadPanel').classList.toggle('show'); }

function handleUpload() {
  const title  = ge('upTitle').value.trim();
  const artist = ge('upArtist').value.trim();
  const cover  = ge('upCover').value.trim();
  const file   = ge('upFile').files[0];
  if (!title||!artist) { toast('Titre et artiste requis','err'); return; }
  if (!file) { toast('Fichier audio requis','err'); return; }
  const rd = new FileReader();
  rd.onload = e => {
    const u = {id:Date.now()+'', title, artist, genre:ge('upGenre').value, cover, audioUrl:e.target.result, duration:0};
    S.uploads.push(u);
    saveLS('nova_uploads', S.uploads);
    const t = uploadTrack(u);
    S.allTracks.push(t);
    S.queue.push(t);
    toast('Track publié !','ok');
    toggleUpload();
    ['upTitle','upArtist','upGenre','upCover'].forEach(id => ge(id).value='');
    ge('upFile').value = '';
  };
  rd.readAsDataURL(file);
}

// ── UTILS ──
function ge(id) { return document.getElementById(id); }
function fmt(s) { if(!s||isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
function esc(v) { return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

let toastTmr;
function toast(msg, type='') {
  const el = ge('toast');
  el.textContent = msg;
  el.className = `toast${type?' '+type:''} show`;
  clearTimeout(toastTmr);
  toastTmr = setTimeout(()=>el.classList.remove('show'), 2500);
}

let searchTmr;
function onSearch() {
  clearTimeout(searchTmr);
  const q = ge('searchInput').value;
  searchTmr = setTimeout(()=>doSearch(q), 500);
}

(async () => {
  try { await spotifyHandleAuthRedirect(); } catch (e) {}
  try { if (spotifyHasAuth()) await spotifyEnsureToken(); } catch (e) {}
  try { updateSpotifyButton(); } catch (e) {}
  try { updateJamendoButton(); } catch (e) {}
  renderDiscover();
})();
