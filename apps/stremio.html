<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stremio Web - FunnyWEB OS</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #0f0f15;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .stremio-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .stremio-header {
            height: 40px;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            justify-content: space-between;
        }

        .stremio-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 14px;
            color: #7b2cbf;
        }

        .stremio-footer {
            height: 30px;
            background: #000;
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .overlay-note {
            position: absolute;
            top: 50px;
            right: 20px;
            background: rgba(123, 44, 191, 0.9);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            max-width: 250px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.5s ease-out;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%);
            }

            to {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <div class="stremio-wrapper">
        <header class="stremio-header">
            <div class="stremio-logo">
                <span style="font-size: 20px;">🎬</span> Stremio Web Premium
            </div>
            <div style="font-size: 11px; opacity: 0.7;">Optimisé pour FunnyWEB! OS</div>
        </header>

        <iframe src="https://web.stremio.com/" allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
            id="stremioFrame"></iframe>

        <footer class="stremio-footer">
            Note: Stremio Web nécessite des addons pour fonctionner. Allez dans les réglages de l'app pour configurer.
        </footer>
    </div>

    <div class="overlay-note" id="welcomeNote">
        🌟 <b>Mode Cinema Activé</b><br>
        Connectez votre compte Stremio ou ajoutez des addons pour profiter de vos films et séries préférés.
    </div>

    <script>
        // Auto-hide note after 5 seconds
        setTimeout(() => {
            const note = document.getElementById('welcomeNote');
            if (note) {
                note.style.transition = 'opacity 1s';
                note.style.opacity = '0';
                setTimeout(() => note.remove(), 1000);
            }
        }, 5000);
    </script>

</body>

</html>
