<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny Girl Senpai | FunnyWEB OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e48ca4;
            --primary-dark: #d17a92;
            --light: #fefefe;
            --soft-gray: #f2f2f2;
            --text: #333;
            --text-light: #777;
            --border: #e0e0e0;
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --light: #121212;
            --soft-gray: #1e1e1e;
            --text: #f0f0f0;
            --text-light: #aaa;
            --border: #333;
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        /* Header adaptatif */
        header {
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #e48ca4, #f6d5f7);
        }

        header::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            z-index: 1;
        }

        [data-theme="dark"] header::after {
            background: rgba(0, 0, 0, 0.6);
        }

        header div {
            position: relative;
            z-index: 2;
        }

        header h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: var(--primary);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto 3rem;
            padding: 0 1.5rem;
        }

        .media-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .media-card {
            background: var(--soft-gray);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .media-card:hover {
            transform: translateY(-5px);
        }

        .poster-container {
            position: relative;
            height: 300px;
            overflow: hidden;
        }

        .poster {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            transition: var(--transition);
        }

        .poster-container:hover .poster {
            transform: scale(1.05);
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: 0.3s;
            z-index: 2;
            border: 2px solid white;
        }

        .poster-container:hover .play-button {
            opacity: 1;
        }

        .play-button::after {
            content: "";
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 15px solid white;
            margin-left: 4px;
        }

        .media-info {
            padding: 1rem;
            flex: 1;
        }

        .media-title {
            color: var(--primary);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .media-meta {
            font-size: 0.75rem;
            color: var(--text-light);
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 8px;
        }

        .media-meta span {
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
        }

        [data-theme="dark"] .media-meta span {
            background: rgba(255, 255, 255, 0.1);
        }

        .media-desc {
            font-size: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            opacity: 0.8;
        }

        /* Modal - Windows Style */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 95%;
            max-width: 900px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Floating buttons */
        .controls-bottom {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: 0.2s;
        }

        .btn-action:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        /* Hidden scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>
        <div>
            <h1>Rascal Does Not Dream</h1>
            <h2 style="font-size: 1rem; opacity: 0.8;">青春ブタ野郎シリーズ</h2>
        </div>
    </header>

    <div class="container">
        <div class="media-container" id="grid">
            <!-- Les cartes seront injectées ou resteraient ici -->
        </div>
    </div>

    <div class="controls-bottom">
        <button class="btn-action" onclick="alert('Bientôt disponible sur FunnyWEB !')">Personnages</button>
        <button class="btn-action" onclick="setTheme()">🌙 Mode</button>
    </div>

    <div class="modal" id="videoModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal()">×</span>
            <iframe id="videoFrame" allowfullscreen src=""></iframe>
        </div>
    </div>

    <script>
        const apps = [
            {
                title: "Bunny Girl Senpai (TV)",
                year: "2018",
                url: "https://vidmoly.net/embed-1hrp1vwb3rv6.html",
                img: "🐰",
                desc: "Sakuta Azusagawa croise Mai Sakurajima, une senpai mystérieuse invisible aux yeux de tous."
            },
            {
                title: "Little Devil Kohai",
                year: "2018",
                url: "https://vidmoly.net/embed-ecdhia53rkbq.html",
                img: "😈",
                desc: "Sakuta revit la même journée en boucle sans comprendre pourquoi."
            },
            {
                title: "Logical Witch",
                year: "2018",
                url: "https://vidmoly.net/embed-a35s1g8b1gbs.html",
                img: "🧙‍♀️",
                desc: "Rio Futaba fait face à une version dédoublée d'elle-même."
            },
            {
                title: "Siscon Idol",
                year: "2018",
                url: "https://vidmoly.net/embed-5lan11umalzs.html",
                img: "🎤",
                desc: "Mai échange son corps avec sa soeur Nodoka Toyohama."
            },
            {
                title: "Sister Home Alone",
                year: "2018",
                url: "https://vidmoly.net/embed-rwikkoo9hsq7.html",
                img: "🏠",
                desc: "Kaede commence à faire des pas pour surmonter son anxiété."
            },
            {
                title: "Dreaming Girl",
                year: "2019",
                url: "https://vidmoly.net/embed-m3x291x4qanj.html",
                img: "💤",
                desc: "Le retour du premier amour de Sakuta, Shoko Makinohara."
            },
            {
                title: "Sister Venturing Out",
                year: "2023",
                url: "https://vidmoly.net/embed-aackijlxsrah.html",
                img: "🎒",
                desc: "Kaede commence à envisager un retour à la vie scolaire."
            },
            {
                title: "Knapsack Kid",
                year: "2023",
                url: "https://vidmoly.net/embed-d3w9atfeand8.html",
                img: "🧒",
                desc: "Sakuta rencontre une version enfant de Mai sur une plage."
            }
        ];

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = apps.map(app => `
        <div class="media-card">
          <div class="poster-container">
            <div class="poster">${app.img}</div>
            <div class="play-button" onclick="openModal('${app.url}')"></div>
          </div>
          <div class="media-info">
            <h3 class="media-title">${app.title}</h3>
            <div class="media-meta"><span>${app.year}</span><span>HD</span></div>
            <p class="media-desc">${app.desc}</p>
          </div>
        </div>
      `).join('');
        }

        function openModal(url) {
            document.getElementById('videoFrame').src = url;
            document.getElementById('videoModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('videoFrame').src = '';
            document.getElementById('videoModal').classList.remove('show');
        }

        function setTheme() {
            const h = document.documentElement;
            const current = h.getAttribute('data-theme');
            h.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        render();
    </script>
</body>

</html>
