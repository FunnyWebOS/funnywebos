<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A84FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="32" cy="32" r="28" fill="url(#grad1)" opacity="0.9"/>
  
  <!-- Grid pattern -->
  <g opacity="0.3">
    <rect x="18" y="18" width="4" height="4" fill="white" rx="1"/>
    <rect x="26" y="18" width="4" height="4" fill="white" rx="1"/>
    <rect x="34" y="18" width="4" height="4" fill="white" rx="1"/>
    <rect x="42" y="18" width="4" height="4" fill="white" rx="1"/>
    
    <rect x="18" y="26" width="4" height="4" fill="white" rx="1"/>
    <rect x="26" y="26" width="4" height="4" fill="white" rx="1"/>
    <rect x="34" y="26" width="4" height="4" fill="white" rx="1"/>
    <rect x="42" y="26" width="4" height="4" fill="white" rx="1"/>
    
    <rect x="18" y="34" width="4" height="4" fill="white" rx="1"/>
    <rect x="26" y="34" width="4" height="4" fill="white" rx="1"/>
    <rect x="34" y="34" width="4" height="4" fill="white" rx="1"/>
    <rect x="42" y="34" width="4" height="4" fill="white" rx="1"/>
    
    <rect x="18" y="42" width="4" height="4" fill="white" rx="1"/>
    <rect x="26" y="42" width="4" height="4" fill="white" rx="1"/>
    <rect x="34" y="42" width="4" height="4" fill="white" rx="1"/>
    <rect x="42" y="42" width="4" height="4" fill="white" rx="1"/>
  </g>
  
  <!-- Central download icon -->
  <g filter="url(#glow)">
    <path d="M32 20 L32 28 L32 28 L32 28" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M32 28 L32 36 L32 36 L32 36" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M26 36 L38 36 L38 36 L38 36" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    
    <!-- Arrow pointing down -->
    <path d="M32 38 L28 44 L36 44 Z" fill="white"/>
    <path d="M32 38 L32 42 L32 42" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Corner highlight -->
  <circle cx="48" cy="16" r="3" fill="white" opacity="0.6"/>
</svg>
